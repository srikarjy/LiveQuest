name: CI

on:
  push:
    branches: [main, livequest]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/livequest-dev
        ports:
          - 7687:7687
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
      - name: Install
        run: |
          uv venv
          uv pip install ".[dev]"
      - name: Lint
        run: uv run ruff check app tests
      - name: Test
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_PASSWORD: livequest-dev
          # Fail rather than skip if the graph tests can't reach Neo4j.
          REQUIRE_NEO4J: "1"
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install
        run: npm ci
      - name: Typecheck & build
        run: npm run build
