name: CI

on:
  push:
    branches: [main, livequest]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
      - name: Install
        run: |
          uv venv
          uv pip install ".[dev]"
      - name: Lint
        run: uv run ruff check app tests
      - name: Test
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install
        run: npm ci
      - name: Typecheck & build
        run: npm run build
