services:
  neo4j:
    image: neo4j:5.26-community
    container_name: bioquest-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/bioquest-dev
      NEO4J_PLUGINS: '["graph-data-science"]'
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: bioquest-backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: bioquest-dev
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      USE_LIVE_DATA: ${USE_LIVE_DATA:-false}
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: bioquest-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
