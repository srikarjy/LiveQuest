<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 400px; padding: 20px; font-family: Arial, sans-serif; }
    #promptDisplay { 
      border: 1px solid #ccc; 
      padding: 10px; 
      margin: 10px 0; 
      min-height: 100px; 
      background: #f9f9f9; 
      white-space: pre-wrap;
    }
    button { 
      margin: 5px; 
      padding: 8px 16px; 
      cursor: pointer; 
    }
    button:disabled { 
      opacity: 0.6; 
      cursor: not-allowed; 
    }
  </style>
</head>
<body>
  <h3>DeepPromptor</h3>
  <div id="promptDisplay">Loading...</div>
  <button id="copyBtn">Copy</button>
  <button id="regenerateBtn">Regenerate</button>
  <script src="popup.js"></script>
</body>
</html>
